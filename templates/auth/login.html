<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to Canteen Management System">
    <title>Login | CanteenMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>

<body>

    <!-- Flash messages at top for login page -->
    <div class="flash-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endwith %}
    </div>

    <div class="login-page">
        <div class="login-card">
            <!-- Brand -->
            <div class="login-logo">🍽 CanteenMS</div>
            <p class="login-subtitle mb-4">Canteen Management System</p>

            <!-- Login Form -->
            <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
                <!-- CSRF Token -->
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <!-- Username -->
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold small">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" class="form-control" id="username" name="username"
                            placeholder="Enter your username" required autofocus autocomplete="username"
                            value="{{ request.form.get('username', '') }}">
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold small">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" class="form-control" id="password" name="password"
                            placeholder="Enter your password" required autocomplete="current-password">
                        <button class="btn btn-outline-secondary" type="button" id="togglePwd" tabindex="-1">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary-custom" id="loginBtn">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </div>
            </form>

            <div class="text-center mt-3 small">
                <span class="text-muted">Don't have an account?</span>
                <a href="{{ url_for('auth.register') }}" class="fw-bold text-primary">Register here</a>
            </div>

            <!-- Demo credentials hint -->
            <div class="mt-4 p-3 rounded-3" style="background:#f5f5ff">
                <p class="mb-1 small fw-semibold text-muted">Demo Credentials</p>
                <div class="d-flex gap-3 flex-wrap">
                    <div class="small">
                        <span class="badge bg-danger me-1">Admin</span>
                        <code>admin / admin123</code>
                    </div>
                    <div class="small">
                        <span class="badge bg-primary me-1">User</span>
                        <code>user1 / user123</code>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/cart.js') }}"></script>
    <script>
        // Toggle password visibility
        document.getElementById('togglePwd').addEventListener('click', () => {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        });
    </script>
</body>

</html>
