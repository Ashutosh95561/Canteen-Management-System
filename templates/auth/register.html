<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create an account on Canteen Management System">
    <title>Register | CanteenMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>

<body>

    <!-- Flash messages at top -->
    <div class="flash-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endwith %}
    </div>

    <div class="login-page">
        <div class="login-card">
            <div class="login-logo text-center mb-2">
                <i class="bi bi-person-plus-fill"></i> Join CanteenMS
            </div>
            <p class="login-subtitle text-center mb-4">Create your account to start ordering delicious food!</p>

            <form method="POST" action="{{ url_for('auth.register') }}" class="needs-validation" novalidate>
                <!-- CSRF Protection -->
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-3">
                    <label for="username" class="form-label small fw-bold text-muted">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i
                                class="bi bi-person text-muted"></i></span>
                        <input type="text" class="form-control border-start-0" id="username" name="username" required
                            placeholder="Choose a username" value="{{ request.form.get('username', '') }}">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label small fw-bold text-muted">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i
                                class="bi bi-envelope text-muted"></i></span>
                        <input type="email" class="form-control border-start-0" id="email" name="email" required
                            placeholder="name@example.com" value="{{ request.form.get('email', '') }}">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label small fw-bold text-muted">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i
                                class="bi bi-lock text-muted"></i></span>
                        <input type="password" class="form-control border-start-0" id="password" name="password"
                            required placeholder="••••••••">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="confirm_password" class="form-label small fw-bold text-muted">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i
                                class="bi bi-shield-lock text-muted"></i></span>
                        <input type="password" class="form-control border-start-0" id="confirm_password"
                            name="confirm_password" required placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary-custom w-100 mb-3 shadow-sm">
                    Create Account <i class="bi bi-arrow-right ms-2"></i>
                </button>

                <div class="text-center small">
                    <span class="text-muted">Already have an account?</span>
                    <a href="{{ url_for('auth.login') }}" class="fw-bold text-primary">Login here</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/cart.js') }}"></script>
</body>

</html>
