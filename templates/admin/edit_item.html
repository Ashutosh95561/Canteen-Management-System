{% extends "base.html" %}
{% block title %}Edit Item{% endblock %}

{% block content %}
<div class="d-flex" style="min-height:calc(100vh - 60px)">
    <aside class="sidebar d-none d-md-flex flex-column">
        <div class="sidebar-heading">Overview</div>
        <a href="{{ url_for('admin.dashboard') }}" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <div class="sidebar-heading">Catalogue</div>
        <a href="{{ url_for('admin.items') }}" class="nav-link active"><i class="bi bi-grid"></i> Menu Items</a>
        <div class="sidebar-heading">Transactions</div>
        <a href="{{ url_for('admin.orders') }}" class="nav-link"><i class="bi bi-receipt"></i> All Orders</a>
        <a href="{{ url_for('admin.report') }}" class="nav-link"><i class="bi bi-bar-chart-line"></i> Sales Report</a>
    </aside>

    <main class="admin-main">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a href="{{ url_for('admin.items') }}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
            <h1 class="h4 fw-bold mb-0">Edit Menu Item</h1>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="content-card">
                    <div class="card-header-custom">
                        <span><i class="bi bi-pencil-square me-2"></i>Editing: {{ item.name }}</span>
                    </div>
                    <div class="p-4">
                        <form method="POST" action="{{ url_for('admin.edit_item', item_id=item.id) }}" novalidate>
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                            <div class="mb-3">
                                <label class="form-label fw-semibold small">Item Name <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="name" value="{{ item.name }}" required
                                    maxlength="120">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold small">Category <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="category" value="{{ item.category }}"
                                    required maxlength="60" list="catList">
                                <datalist id="catList">
                                    <option value="Meals">
                                    <option value="Snacks">
                                    <option value="Beverages">
                                    <option value="Desserts">
                                </datalist>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold small">Price (₹) <span
                                        class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text">₹</span>
                                    <input type="number" class="form-control" name="price" value="{{ item.price }}"
                                        min="0" step="0.01" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold small">Stock Quantity <span
                                        class="text-danger">*</span></label>
                                <input type="number" class="form-control" name="stock_quantity"
                                    value="{{ item.stock_quantity }}" min="0" step="1" required>
                            </div>

                            <div class="mb-4">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="isAvailable" name="is_available"
                                        {{ 'checked' if item.is_available }}>
                                    <label class="form-check-label fw-semibold small" for="isAvailable">Item Available
                                        on Menu</label>
                                </div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary-custom flex-grow-1">
                                    <i class="bi bi-check-lg me-2"></i>Save Changes
                                </button>
                                <a href="{{ url_for('admin.items') }}" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
{% endblock %}
